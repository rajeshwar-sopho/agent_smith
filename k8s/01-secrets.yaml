# Create this file by running: ./scripts/create-k8s-secrets.sh
# Or manually: kubectl create secret generic bot-orchestrator-secrets \
#   --namespace=bot-orchestrator \
#   --from-literal=ANTHROPIC_API_KEY=your-key-here \
#   --from-literal=GEMINI_API_KEY=your-key-here

apiVersion: v1
kind: Secret
metadata:
  name: bot-orchestrator-secrets
  namespace: bot-orchestrator
type: Opaque
stringData:
  ANTHROPIC_API_KEY: ""     # Replace with your Anthropic API key
  GEMINI_API_KEY: ""        # Replace with your Gemini API key
